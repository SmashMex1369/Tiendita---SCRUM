<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Productos - Tiendita Don C.H.U.Y</title>
	<link rel="stylesheet" href="productos.css">
</head>
<body>
	<header>
		<div class="header-bar">
			<h1>Tiendita Don C.H.U.Y</h1>
		</div>
		<nav class="nav-bar">
			<button class="nav-btn">
				<span class="nav-icon">🏠</span>
				Inicio
			</button>
			<button class="nav-btn">
				<span class="nav-icon">📦</span>
				Productos
			</button>
			<button class="nav-btn">
				<span class="nav-icon">💲</span>
				Ventas
			</button>
			<button class="nav-btn">
				<span class="nav-icon">🛒</span>
				Carrito
			</button>
		</nav>
	</header>

	<main>
		<h2 class="productos-title">Productos</h2>
		<button class="add-product-btn">AGREGAR NUEVO PRODUCTO</button>
		<section class="productos-grid">
			<!-- Ejemplo de producto, repite este bloque para cada producto -->
			<div class="producto-card">
				<div class="producto-nombre">Azucar</div>
				<div class="producto-precio">$80.00</div>
				<div class="producto-disponible">Disponible: 2</div>
				<button class="producto-add">+</button>
			</div>
			<div class="producto-card">
				<div class="producto-nombre">Frijoles</div>
				<div class="producto-precio">$18.00</div>
				<div class="producto-disponible">Disponible: 2</div>
				<button class="producto-add">+</button>
			</div>
			<!-- Más productos aquí, solo copia el bloque de arriba cambiando los datos -->
		</section>
	</main>
</body>
</html>
